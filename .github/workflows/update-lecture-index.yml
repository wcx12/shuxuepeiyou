name: Update lecture index

on:
  push:
    branches:
      - main
    paths:
      - '领军计划/讲义/**'
      - 'tools/generate_lecture_index.py'
      - 'index.html'
      - '.github/workflows/update-lecture-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate lecture index
        run: python tools/generate_lecture_index.py

      - name: Commit generated homepage
        run: |
          if git diff --quiet -- index.html; then
            echo "No lecture index changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update lecture download index"
          git push
