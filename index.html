<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数学培优</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      color: #102033;
      background: linear-gradient(135deg, #f5fbff 0%, #e8f2ff 52%, #fff8e8 100%);
    }
    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }
    .card {
      padding: 32px;
      border: 1px solid rgba(38, 83, 140, 0.16);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 24px 80px rgba(34, 73, 122, 0.13);
      backdrop-filter: blur(16px);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 24px;
      color: #4d6075;
      line-height: 1.8;
    }
    a {
      color: #0c5da5;
      text-decoration: none;
      font-weight: 700;
    }
    .links {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .link-card {
      display: block;
      padding: 20px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(12, 93, 165, 0.12);
    }
    .link-card span {
      display: block;
      margin-top: 8px;
      color: #63758a;
      font-weight: 400;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>数学培优</h1>
      <p>领军计划讲义与可视化网页入口。讲义源码和 PDF 保存在仓库中，可视化页面可直接通过 GitHub Pages 公网访问。</p>
      <div class="links">
        <a class="link-card" href="https://wcx12.github.io/shuxuepeiyou-visualizations/">
          可视化网页
          <span>导数题图像、四面体不等式等交互式页面。</span>
        </a>
        <a class="link-card" href="https://github.com/wcx12/shuxuepeiyou">
          GitHub 仓库
          <span>查看讲义源码、PDF、网页源码和维护规范。</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
